version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      - redis
    volumes:
      - .:/workspace

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  redis-data:
